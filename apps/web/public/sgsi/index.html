<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SGSI Platform — LogiNorte SAC</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #f0eee9;
    color: #2a251f;
    overflow: hidden;
  }
  #root { width: 100vw; height: 100vh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes slideL { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.TWEAK_DEFAULTS = {
    "dark": true,
    "palette": "purple",
    "density": "comfortable",
    "sidebar": "full",
    "cards": "glass"
  };
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script src="data.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-m1.jsx"></script>
<script type="text/babel" src="screens-m2.jsx"></script>
<script type="text/babel" src="screens-m3.jsx"></script>
<script type="text/babel" src="screens-m4.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  // Wait for all Babel scripts to compile, then mount
  setTimeout(() => {
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<window.SGSI_Root />);
  }, 150);
</script>

</body>
</html>
